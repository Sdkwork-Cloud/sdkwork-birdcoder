name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_GIT_PROTOCOL: ssh
  SDKWORK_SHARED_SDK_GITHUB_TOKEN: ${{ secrets.SDKWORK_SHARED_SDK_GITHUB_TOKEN || github.token }}

jobs:
  workspace-verify:
    name: Workspace verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Setup shared SDK SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SDKWORK_SHARED_SDK_SSH_PRIVATE_KEY }}

      - name: Prepare shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run workspace lint and parity checks
        run: pnpm lint

      - name: Run desktop contract checks
        run: pnpm check:desktop

      - name: Run Rust desktop tests
        shell: bash
        run: |
          set +e
          node scripts/run-cargo.mjs test --manifest-path packages/sdkwork-birdcoder-desktop/src-tauri/Cargo.toml 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          if [[ $status -ne 0 ]]; then
            tail -n 200 cargo-test.log
            summary=$(tail -n 60 cargo-test.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Rust desktop tests failed::$summary"
            exit $status
          fi

      - name: Run server contract and Rust checks
        run: pnpm check:server

      - name: Build web workspace
        run: pnpm build

      - name: Build server workspace
        run: pnpm server:build

      - name: Build docs site
        run: pnpm docs:build

      - name: Prove release readiness success path
        run: pnpm release:fixture:ready

      - name: Prove release candidate dry-run success path
        run: pnpm release:candidate:dry-run

      - name: Upload release candidate dry-run evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-dry-run-evidence
          path: artifacts/release-candidate-dry-run
          if-no-files-found: error
          retention-days: 30

  desktop-rust-windows:
    name: Desktop Rust tests (windows)
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup shared SDK SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SDKWORK_SHARED_SDK_SSH_PRIVATE_KEY }}

      - name: Prepare shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run Windows desktop Rust tests
        shell: bash
        run: |
          set +e
          node scripts/run-cargo.mjs test --manifest-path packages/sdkwork-birdcoder-desktop/src-tauri/Cargo.toml 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          if [[ $status -ne 0 ]]; then
            tail -n 200 cargo-test.log
            summary=$(tail -n 60 cargo-test.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Windows desktop Rust tests failed::$summary"
            exit $status
          fi

      - name: Run Windows server checks
        run: pnpm check:server

      - name: Run Windows server build
        run: pnpm server:build
