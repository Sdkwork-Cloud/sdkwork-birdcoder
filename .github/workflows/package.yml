name: Package Application

on:
  push:
    tags:
      - 'release-*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or source ref to package.
        required: false
        default: ''
      package_version:
        description: Package version used in artifact names and manifests.
        required: false
        default: ''
      platform:
        description: Platform filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
          - web
          - container
      architecture:
        description: CPU architecture filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - x64
          - arm64
          - noarch
      profile:
        description: Runtime profile filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - desktop
          - server
          - web
      variant:
        description: Package variant filter.
        required: false
        default: all
      format:
        description: Package format filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - exe
          - msi
          - deb
          - rpm
          - appimage
          - dmg
          - tar.gz
          - helm
      sdkwork_appbase_ref:
        description: sdkwork-appbase commit/ref.
        required: false
        default: b74a1413d387c803b524df96dc150fb02ce8c25f
      sdkwork_iam_ref:
        description: sdkwork-iam commit/ref.
        required: false
        default: 0c112a7e5fcf1fa07431c5ededb56ea7c5f9d473
      sdkwork_core_ref:
        description: sdkwork-core commit/ref.
        required: false
        default: 864d0264d9e170ea0d1820402f46195be62fecf6
      sdkwork_ui_ref:
        description: sdkwork-ui commit/ref.
        required: false
        default: e2dea9c788f93c3a59d25c1791c7bb8c0ad0bb38
      sdkwork_drive_ref:
        description: sdkwork-drive commit/ref.
        required: false
        default: 20966a79da72984a67495c329416a10715b4857e
      sdkwork_messaging_ref:
        description: sdkwork-messaging commit/ref.
        required: false
        default: 3d403ddf424dcdfb441d34d4ee71e942bb041498
      sdkwork_sdk_commons_ref:
        description: sdkwork-sdk-commons commit/ref.
        required: false
        default: c9adc5a02fed0d9ce70ab719e5d2155ed40676da
      sdkwork_search_ref:
        description: sdkwork-search commit/ref.
        required: false
        default: b209e9477549a2e8984e3390253457584cf8a8ba
      sdkwork_terminal_ref:
        description: sdkwork-terminal commit/ref.
        required: false
        default: c1ede947442bf65ac0b3f7b370891d3664cff8e7
      sdkwork_sdk_generator_ref:
        description: sdkwork-sdk-generator commit/ref.
        required: false
        default: 0b0e984ffbdec49a28c2da3edebcdddab4087e62
      sdkwork_membership_ref:
        description: sdkwork-membership commit/ref.
        required: false
        default: 32d1f981b3be085e93aaca3de177d482c2f75fe7
      sdkwork_promotion_ref:
        description: sdkwork-promotion commit/ref.
        required: false
        default: f1238eda5ef661641cf7445fec3103a45b3c55e8
      sdkwork_order_ref:
        description: sdkwork-order commit/ref.
        required: false
        default: 5f4c1fa702d37b9226072483fc4686a115c53fb8
      sdkwork_web_framework_ref:
        description: sdkwork-web-framework commit/ref.
        required: false
      sdkwork_database_ref:
        description: sdkwork-database commit/ref.
        required: false
      sdkwork_utils_ref:
        description: sdkwork-utils commit/ref.
        required: false
      sdkwork_app_topology_ref:
        description: sdkwork-app-topology commit/ref.
        required: false
        default: fb656fe301244e7b4b9923d0bbdc9cc02176bc85
      sdkwork_models_ref:
        description: sdkwork-models commit/ref.
        required: false
        default: 39e1950a73500387352be00ef245c0d701dd0313
      sdkwork_kernel_ref:
        description: sdkwork-kernel commit/ref.
        required: false
      sdkwork_agents_ref:
        description: sdkwork-agents commit/ref.
        required: false

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
  packages: write

jobs:
  package:
    uses: Sdkwork-Cloud/sdkwork-github-workflow/.github/workflows/sdkwork-package.yml@b1bdb5887f0f9e5683a46a02eaeb818c042b8a33
    with:
      config_path: sdkwork.workflow.json
      tag: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
      package_version: ${{ github.event.inputs.package_version || '' }}
      platform: ${{ github.event.inputs.platform || 'all' }}
      architecture: ${{ github.event.inputs.architecture || 'all' }}
      profile: ${{ github.event.inputs.profile || 'all' }}
      variant: ${{ github.event.inputs.variant || 'all' }}
      format: ${{ github.event.inputs.format || 'all' }}
      publish_release: true
      upload_artifact: true
      deploy: false
      retention_days: 30
      framework_ref: b1bdb5887f0f9e5683a46a02eaeb818c042b8a33
      dependency_refs_json: >-
        {
          "SDKWORK_APPBASE_REF": "${{ github.event.inputs.sdkwork_appbase_ref || vars.SDKWORK_APPBASE_REF }}",
          "SDKWORK_IAM_REF": "${{ github.event.inputs.sdkwork_iam_ref || vars.SDKWORK_IAM_REF }}",
          "SDKWORK_CORE_REF": "${{ github.event.inputs.sdkwork_core_ref || vars.SDKWORK_CORE_REF }}",
          "SDKWORK_UI_REF": "${{ github.event.inputs.sdkwork_ui_ref || vars.SDKWORK_UI_REF }}",
          "SDKWORK_DRIVE_REF": "${{ github.event.inputs.sdkwork_drive_ref || vars.SDKWORK_DRIVE_REF }}",
          "SDKWORK_MESSAGING_REF": "${{ github.event.inputs.sdkwork_messaging_ref || vars.SDKWORK_MESSAGING_REF }}",
          "SDKWORK_SDK_COMMONS_REF": "${{ github.event.inputs.sdkwork_sdk_commons_ref || vars.SDKWORK_SDK_COMMONS_REF }}",
          "SDKWORK_SEARCH_REF": "${{ github.event.inputs.sdkwork_search_ref || vars.SDKWORK_SEARCH_REF }}",
          "SDKWORK_TERMINAL_REF": "${{ github.event.inputs.sdkwork_terminal_ref || vars.SDKWORK_TERMINAL_REF }}",
          "SDKWORK_SDK_GENERATOR_REF": "${{ github.event.inputs.sdkwork_sdk_generator_ref || vars.SDKWORK_SDK_GENERATOR_REF }}",
          "SDKWORK_MEMBERSHIP_REF": "${{ github.event.inputs.sdkwork_membership_ref || vars.SDKWORK_MEMBERSHIP_REF }}",
          "SDKWORK_PROMOTION_REF": "${{ github.event.inputs.sdkwork_promotion_ref || vars.SDKWORK_PROMOTION_REF }}",
          "SDKWORK_ORDER_REF": "${{ github.event.inputs.sdkwork_order_ref || vars.SDKWORK_ORDER_REF }}",
          "SDKWORK_WEB_FRAMEWORK_REF": "${{ github.event.inputs.sdkwork_web_framework_ref || vars.SDKWORK_WEB_FRAMEWORK_REF }}",
          "SDKWORK_DATABASE_REF": "${{ github.event.inputs.sdkwork_database_ref || vars.SDKWORK_DATABASE_REF }}",
          "SDKWORK_UTILS_REF": "${{ github.event.inputs.sdkwork_utils_ref || vars.SDKWORK_UTILS_REF }}",
          "SDKWORK_APP_TOPOLOGY_REF": "${{ github.event.inputs.sdkwork_app_topology_ref || vars.SDKWORK_APP_TOPOLOGY_REF }}",
          "SDKWORK_MODELS_REF": "${{ github.event.inputs.sdkwork_models_ref || vars.SDKWORK_MODELS_REF }}",
          "SDKWORK_KERNEL_REF": "${{ github.event.inputs.sdkwork_kernel_ref || vars.SDKWORK_KERNEL_REF }}",
          "SDKWORK_AGENTS_REF": "${{ github.event.inputs.sdkwork_agents_ref || vars.SDKWORK_AGENTS_REF }}"
        }
    secrets: inherit
