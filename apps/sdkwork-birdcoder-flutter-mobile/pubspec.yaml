name: sdkwork_birdcoder_flutter_mobile
description: SDKWork Birdcoder Flutter Mobile App
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Mobile core platform/runtime dependencies.
  http: ^1.2.0
  dio: ^5.4.0
  cupertino_icons: ^1.0.6
  camera: ^0.11.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.5
  flutter_secure_storage: ^9.2.0
  local_auth: ^2.2.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  # Workspace packages.
  sdkwork_birdcoder_flutter_mobile_core:
    path: packages/sdkwork_birdcoder_flutter_mobile_core
  sdkwork_birdcoder_flutter_mobile_commons:
    path: packages/sdkwork_birdcoder_flutter_mobile_commons
  sdkwork_birdcoder_flutter_mobile_shell:
    path: packages/sdkwork_birdcoder_flutter_mobile_shell
  sdkwork_birdcoder_flutter_mobile_chat:
    path: packages/sdkwork_birdcoder_flutter_mobile_chat
  sdkwork_birdcoder_flutter_mobile_host:
    path: packages/sdkwork_birdcoder_flutter_mobile_host
  sdkwork_birdcoder_flutter_mobile_console_core:
    path: packages/sdkwork_birdcoder_flutter_mobile_console_core
  sdkwork_birdcoder_flutter_mobile_console_shell:
    path: packages/sdkwork_birdcoder_flutter_mobile_console_shell
  sdkwork_birdcoder_flutter_mobile_admin_core:
    path: packages/sdkwork_birdcoder_flutter_mobile_admin_core
  sdkwork_birdcoder_flutter_mobile_admin_shell:
    path: packages/sdkwork_birdcoder_flutter_mobile_admin_shell

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true
