<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <style>
      :root {
        color-scheme: dark;
        background: #0e0e11;
        font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        margin: 0;
        overflow: hidden;
      }

      .sdkwork-startup-screen {
        --startup-accent: #4c8dff;
        --startup-background: #0e0e11;
        --startup-muted: #8c929d;
        align-items: stretch;
        background: var(--startup-background);
        color: #f1f3f5;
        display: flex;
        font-synthesis: none;
        height: 100vh;
        justify-content: center;
        letter-spacing: 0;
        min-height: 360px;
        overflow: hidden;
        width: 100%;
        -webkit-font-smoothing: antialiased;
      }

      .sdkwork-startup-shell {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: max(22px, env(safe-area-inset-top)) 24px max(22px, env(safe-area-inset-bottom));
        width: 100%;
      }

      .sdkwork-startup-brand {
        align-items: center;
        display: flex;
        flex: 0 0 auto;
        gap: 10px;
      }

      .sdkwork-startup-mark {
        align-items: center;
        background: #2872e8;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 7px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
        box-sizing: border-box;
        color: #ffffff;
        display: inline-flex;
        font-size: 14px;
        font-weight: 750;
        height: 30px;
        justify-content: center;
        line-height: 1;
        width: 30px;
      }

      .sdkwork-startup-brand-copy {
        align-items: baseline;
        display: flex;
        gap: 5px;
      }

      .sdkwork-startup-brand-vendor,
      .sdkwork-startup-brand-product {
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
      }

      .sdkwork-startup-brand-vendor {
        color: #7f8691;
        font-weight: 500;
      }

      .sdkwork-startup-brand-product {
        color: #dfe2e7;
        font-weight: 620;
      }

      .sdkwork-startup-content {
        animation: sdkwork-startup-content-enter 280ms ease-out both;
        align-self: center;
        margin: auto;
        max-width: 440px;
        padding: 64px 0;
        text-align: center;
        width: min(100%, 440px);
      }

      .sdkwork-startup-state-row {
        align-items: center;
        display: flex;
        justify-content: center;
        margin-bottom: 16px;
      }

      .sdkwork-startup-status-mark {
        align-items: center;
        display: inline-flex;
        height: 20px;
        justify-content: center;
        width: 20px;
      }

      .sdkwork-startup-status-dot {
        animation: sdkwork-startup-spin 900ms linear infinite;
        border: 2px solid rgba(76, 141, 255, 0.22);
        border-radius: 50%;
        border-top-color: var(--startup-accent);
        box-sizing: border-box;
        height: 16px;
        width: 16px;
      }

      .sdkwork-startup-content h1 {
        font-size: 22px;
        font-weight: 620;
        line-height: 1.3;
        margin: 0;
      }

      .sdkwork-startup-description {
        color: var(--startup-muted);
        font-size: 13px;
        line-height: 1.6;
        margin: 9px auto 28px;
        min-height: 21px;
      }

      .sdkwork-startup-progress {
        margin: 0 auto;
        width: min(100%, 400px);
      }

      .sdkwork-startup-progress-track {
        background: rgba(255, 255, 255, 0.09);
        border-radius: 999px;
        height: 3px;
        overflow: hidden;
      }

      .sdkwork-startup-progress-track span {
        background: var(--startup-accent);
        border-radius: inherit;
        display: block;
        height: 100%;
        width: 12%;
      }

      .sdkwork-startup-progress-meta {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
      }

      .sdkwork-startup-progress-stage {
        color: #9298a2;
        font-size: 11px;
        line-height: 1.4;
        min-width: 0;
        overflow: hidden;
        padding-right: 12px;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sdkwork-startup-progress-value {
        color: #aeb3bc;
        flex: 0 0 auto;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      @keyframes sdkwork-startup-content-enter {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes sdkwork-startup-spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 520px) {
        .sdkwork-startup-shell { padding-left: 20px; padding-right: 20px; }
        .sdkwork-startup-content { padding: 44px 0; }
        .sdkwork-startup-progress { width: 100%; }
      }

      @media (max-height: 520px) {
        .sdkwork-startup-shell { padding-bottom: 16px; padding-top: 16px; }
        .sdkwork-startup-content { padding: 20px 0 14px; }
        .sdkwork-startup-description { margin-bottom: 20px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .sdkwork-startup-content,
        .sdkwork-startup-status-dot { animation: none; }
      }
    </style>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>SDKWork BirdCoder Desktop</title>
  </head>
  <body>
    <div id="root">
      <main class="sdkwork-startup-screen" data-birdcoder-boot-shell aria-busy="true">
        <div class="sdkwork-startup-shell">
          <header class="sdkwork-startup-brand" aria-label="SDKWork BirdCoder">
            <span class="sdkwork-startup-mark" aria-hidden="true">B</span>
            <span class="sdkwork-startup-brand-copy">
              <span class="sdkwork-startup-brand-vendor">SDKWork</span>
              <span class="sdkwork-startup-brand-product">BirdCoder</span>
            </span>
          </header>
          <section class="sdkwork-startup-content" aria-live="polite" role="status">
            <div class="sdkwork-startup-state-row" aria-hidden="true">
              <span class="sdkwork-startup-status-mark" aria-hidden="true">
                <span class="sdkwork-startup-status-dot"></span>
              </span>
            </div>
            <h1>SDKWork BirdCoder</h1>
            <p class="sdkwork-startup-description" id="sdkwork-startup-description">Connecting to the local runtime and preparing your workspace.</p>
            <div
              class="sdkwork-startup-progress"
              role="progressbar"
              aria-describedby="sdkwork-startup-description"
              aria-label="Local runtime"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="12"
              aria-valuetext="Local runtime: 12%"
            >
              <div class="sdkwork-startup-progress-track"><span></span></div>
              <div class="sdkwork-startup-progress-meta" aria-hidden="true">
                <span class="sdkwork-startup-progress-stage">Local runtime</span>
                <span class="sdkwork-startup-progress-value">12%</span>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
