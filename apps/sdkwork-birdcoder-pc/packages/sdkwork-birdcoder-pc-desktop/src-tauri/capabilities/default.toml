# Tauri 2 capability for the main BirdCoder desktop PRODUCTION window.
# Follows sdkwork-specs/SECURITY_SPEC.md: every command permission is declared
# explicitly so the allowlist is auditable. High-risk mutating commands
# (fs_write_file, fs_delete_entry, local_sql_execute_plan,
# desktop_local_shell_exec) are listed individually rather than through a broad
# permission set, making their exposure explicit and reviewable.
#
# Capability differentiation (per SECURITY_SPEC.md):
# - Production build (this file): targets window "main", grants full
#   permissions including filesystem write/delete and local shell execution.
# - Test/dev build (capabilities/test.toml): targets window "main-test"
#   (see tauri.test.conf.json), restricts to read-only filesystem and
#   non-destructive host bridges. High-risk mutating commands are excluded
#   so test/dev builds run with least privilege.
#
# When adding a new high-risk mutating command, declare it here in
# production and intentionally EXCLUDE it from test.toml so the test
# capability stays least-privilege.
identifier = "default"
description = "Default desktop capability for the main BirdCoder window. Explicitly allowlists every Tauri command permission including high-risk mutating operations."
windows = ["main"]
permissions = [
  # Core framework permissions
  "core:default",

  # Window control permissions
  "core:window:allow-hide",
  "core:window:allow-start-dragging",
  "core:window:allow-internal-toggle-maximize",
  "core:window:allow-is-fullscreen",
  "core:window:allow-is-maximized",
  "core:window:allow-is-minimized",
  "core:window:allow-is-visible",
  "core:window:allow-maximize",
  "core:window:allow-minimize",
  "core:window:allow-show",
  "core:window:allow-set-focus",
  "core:window:allow-set-fullscreen",
  "core:window:allow-toggle-maximize",
  "core:window:allow-unmaximize",
  "core:window:allow-unminimize",
  "core:window:allow-close",

  # Host bridge commands
  "allow-host-mode",
  "allow-desktop-runtime-config",
  "allow-desktop-runtime-location-install-identity",
  "allow-desktop-runtime-location-create-root-locator",

  # Local store commands
  "allow-local-store-get",
  "allow-local-store-set",
  "allow-local-store-delete",
  "allow-local-store-list",

  # HIGH-RISK: local SQL execution — explicit allowlist for DDL/DML access
  "allow-local-sql-execute-plan",

  # User home config commands
  "allow-user-home-config-read",
  "allow-user-home-config-write",

  # Filesystem bridge commands (read-only)
  "allow-fs-list-directory",
  "allow-fs-snapshot-folder",
  "allow-fs-read-file",
  "allow-fs-get-file-revision",
  "allow-fs-get-file-revisions",
  "allow-fs-get-directory-revisions",

  # HIGH-RISK: filesystem write — explicit allowlist for mutating file content
  "allow-fs-write-file",
  "allow-fs-create-file",
  "allow-fs-create-directory",

  # HIGH-RISK: filesystem delete — explicit allowlist for destructive removal
  "allow-fs-delete-entry",
  "allow-fs-rename-entry",
  "allow-fs-watch-start",
  "allow-fs-watch-stop",

  # Native Git bridge commands. Branch, commit, push, and worktree operations
  # are production-only because they mutate the checked-out repository.
  "allow-git-project-overview",
  "allow-git-project-diff",
  "allow-git-create-branch",
  "allow-git-switch-branch",
  "allow-git-commit-changes",
  "allow-git-push-branch",
  "allow-git-create-worktree",
  "allow-git-remove-worktree",
  "allow-git-prune-worktrees",

  # Desktop shell host bridge commands
  "allow-terminal-cli-profile-detect",
  "allow-desktop-pick-working-directory",
  "allow-desktop-reveal-in-file-manager",
  "allow-desktop-window-controls-bridge-capabilities",
  "allow-desktop-configure-window-controls-bridge",
  "allow-desktop-perform-window-control-action",
  "allow-desktop-session-index",
  "allow-desktop-session-replay-slice",
  "allow-desktop-session-attach",
  "allow-desktop-session-detach",
  "allow-desktop-session-reattach",
  "allow-desktop-terminal-session-inventory-list",

  # HIGH-RISK: local shell execution — explicit allowlist for arbitrary command exec
  "allow-desktop-local-shell-exec",
  "allow-desktop-local-shell-session-create",
  "allow-desktop-local-process-session-create",
  "allow-desktop-session-input",
  "allow-desktop-session-input-bytes",
  "allow-desktop-session-attachment-acknowledge",
  "allow-desktop-session-resize",
  "allow-desktop-session-terminate",
]
