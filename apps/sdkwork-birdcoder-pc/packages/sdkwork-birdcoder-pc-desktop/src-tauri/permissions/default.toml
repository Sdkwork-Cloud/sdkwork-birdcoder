[default]
description = "Default desktop app permissions for the BirdCoder Rust host bridge."
permissions = [
  "allow-host-mode",
  "allow-desktop-runtime-config",
  "allow-desktop-runtime-location-install-identity",
  "allow-desktop-runtime-location-create-root-locator",
  "allow-local-store-get",
