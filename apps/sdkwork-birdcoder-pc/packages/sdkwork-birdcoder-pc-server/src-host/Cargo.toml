[package]
name = "sdkwork-birdcoder-pc-server-host-shim"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "sdkwork-birdcoder-pc-server-host-shim"
path = "src/main.rs"

[dependencies]
sdkwork-api-birdcoder-standalone-gateway = { path = "../../../../../crates/sdkwork-api-birdcoder-standalone-gateway" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
