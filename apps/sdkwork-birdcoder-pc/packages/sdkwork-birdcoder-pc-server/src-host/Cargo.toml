[package]
name = "sdkwork-birdcoder-pc-server-host-shim"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "sdkwork-birdcoder-pc-server-host-shim"
path = "src/main.rs"

[dependencies]
sdkwork-birdcoder-api-server = { path = "../../../../../../crates/sdkwork-birdcoder-api-server" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
