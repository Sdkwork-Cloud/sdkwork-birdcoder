<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <style>
      :root,
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #0e0e11;
      }

      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      [data-birdcoder-boot-shell] {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      [data-birdcoder-boot-spinner] {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-top-color: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        animation: birdcoder-boot-spin 0.8s linear infinite;
      }

      @keyframes birdcoder-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <title>SDKWork BirdCoder</title>
  </head>
  <body>
    <div id="root">
      <div data-birdcoder-boot-shell role="status" aria-label="Starting BirdCoder">
        <div data-birdcoder-boot-spinner aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
