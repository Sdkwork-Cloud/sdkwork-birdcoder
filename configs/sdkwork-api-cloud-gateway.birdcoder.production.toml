mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
# The production service binds inside the deployment network. Restrict public
# exposure at the ingress/edge and replace the host/origin placeholders below.
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-birdcoder-app-api"
workspace = "sdkwork-birdcoder"
sdkFamily = "sdkwork-birdcoder-app-sdk"
apiAuthority = "sdkwork-birdcoder-app-api"
surface = "app"
apiPrefix = "/app/v3/api/birdcoder"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_BIRDCODER_APPLICATION_PUBLIC_HTTP_URL"
coverage = "birdcoder-app-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-birdcoder-app-api"
baseUrl = "http://127.0.0.1:8080"

[cors]
allowAnyOrigin = false
allowedOrigins = ["https://birdcoder.example.invalid"]

[request]
maxBodyBytes = 33554432
timeoutMs = 0

[readiness]
checkUpstreams = true
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = false
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
# Replace before deployment. Do not trust forwarded headers until the actual
# ingress or load-balancer CIDRs are supplied in an environment-private overlay.
allowedHosts = ["birdcoder.example.invalid"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[security.waf]
enabled = false
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 256
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = false
maxAttempts = 1
retryStatuses = [502, 503, 504]
retryBackoffMs = 0
circuitBreakerEnabled = false
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
