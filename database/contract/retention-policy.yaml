retention_policy_version: 1
kind: sdkwork.database.retention_policy
module_id: birdcoder
owner_team: birdcoder-workbench
default_retention_days: 730
default_archive_strategy: cold-storage
default_schedule: "0 2 * * 0"
tables:
  - name: studio_project_runtime_location_idempotency
    retention_days: 7
    archive_strategy: delete
    archive_after_days: 0
    schedule: "0 1 * * *"
    notes: Expired replay keys contain hashes and resource references only.
  - name: studio_project_sandbox_binding_idempotency
    retention_days: 7
    archive_strategy: delete
    archive_after_days: 0
    schedule: "15 1 * * *"
    notes: Expired replay keys contain hashes and resource references only.
  - name: studio_project_runtime_location_audit
    retention_days: 730
    archive_strategy: cold-storage
    archive_after_days: 180
    schedule: "0 2 * * 0"
    notes: Security evidence is redacted before persistence and archived before deletion.
  - name: studio_project_sandbox_binding_audit
    retention_days: 730
    archive_strategy: cold-storage
    archive_after_days: 180
    schedule: "30 2 * * 0"
    notes: Drive Sandbox binding evidence is redacted before persistence and archived before deletion.
