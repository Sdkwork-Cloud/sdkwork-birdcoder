services:
  sdkwork-birdcoder:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    env_file:
      - profiles/default.env
    ports:
      - "18989:18989"
    volumes:
      - sdkwork-birdcoder-data:/var/lib/sdkwork-birdcoder
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:18989/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "10001:10001"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sdkwork-birdcoder-data:
