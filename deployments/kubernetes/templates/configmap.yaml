apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sdkwork-birdcoder.fullname" . }}
data:
  SDKWORK_BIRDCODER_DEPLOYMENT_PROFILE: {{ .Values.runtime.deploymentProfile | quote }}
  SDKWORK_BIRDCODER_RUNTIME_TARGET: {{ .Values.runtime.runtimeTarget | quote }}
  SDKWORK_BIRDCODER_ENVIRONMENT: {{ .Values.runtime.environment | quote }}
  SDKWORK_BIRDCODER_ALLOWED_ORIGINS: {{ join "," .Values.runtime.allowedOrigins | quote }}
  OTEL_SERVICE_NAME: {{ .Values.runtime.otelServiceName | quote }}
  SDKWORK_BIRDCODER_REALTIME_BACKEND: {{ .Values.realtime.backend | quote }}
  SDKWORK_BIRDCODER_REDIS_ENABLED: {{ .Values.redis.enabled | quote }}
  SDKWORK_BIRDCODER_REDIS_HOST: {{ .Values.redis.host | quote }}
  SDKWORK_BIRDCODER_REDIS_PORT: {{ .Values.redis.port | quote }}
  SDKWORK_BIRDCODER_REDIS_DATABASE: {{ .Values.redis.database | quote }}
  SDKWORK_BIRDCODER_REDIS_KEY_PREFIX: {{ .Values.redis.keyPrefix | quote }}
  SDKWORK_BIRDCODER_REDIS_TLS: {{ .Values.redis.tls | quote }}
  # Rate limiting resolves the same SDKWORK_BIRDCODER_REDIS_* configuration as
  # realtime. Do not materialize a credential-bearing Redis URL in a ConfigMap.
  SDKWORK_BIRDCODER_SERVER_PORT: {{ .Values.service.port | quote }}
  SDKWORK_BIRDCODER_APP_ROOT: "/opt/sdkwork-birdcoder"
  SDKWORK_OPENAPI_SNAPSHOT_PATH: "/opt/sdkwork-birdcoder/openapi/birdcoder-app-api.openapi.json"
  {{- if .Values.observability }}
  {{- with .Values.observability }}
  RUST_LOG: {{ .logLevel | default "info" | quote }}
  OTEL_TRACES_EXPORTER: {{ .tracesExporter | default "otlp" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .otlpEndpoint | default "" | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .otlpProtocol | default "grpc" | quote }}
  OTEL_METRICS_EXPORTER: {{ .metricsExporter | default "prometheus" | quote }}
  OTEL_LOGS_EXPORTER: {{ .logsExporter | default "otlp" | quote }}
  {{- if .tracesSamplingRatio }}
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: {{ .tracesSamplingRatio | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
