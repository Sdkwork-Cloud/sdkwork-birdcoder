# Stateless high-availability overlay for SDKWork BirdCoder.
# Apply with values.yaml after provisioning Redis HA and OpenTelemetry.

replicaCount: 3

realtime:
  backend: redis

redis:
  enabled: true
  host: redis-master
  port: 6379
  database: 0
  keyPrefix: birdcoder
  tls: true

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 2

observability:
  logLevel: info
  tracesExporter: otlp
  otlpEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"
  otlpProtocol: grpc
  metricsExporter: prometheus
  logsExporter: otlp
  tracesSamplingRatio: "0.1"

resources:
  limits:
    cpu: "4"
    memory: 8Gi
  requests:
    cpu: "1"
    memory: 1Gi
