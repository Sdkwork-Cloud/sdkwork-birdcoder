image:
  repository: ghcr.io/sdkwork-cloud/sdkwork-birdcoder-server
  # tag is used for development and testing only.
  # Production deployments MUST set digest to an immutable SHA256 digest
  # (e.g. sha256:abc123...) and leave tag empty.
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 18989

# Cloud control-plane baseline. PostgreSQL and a pre-provisioned runtime Secret
# are required; this chart intentionally does not start against a SQLite fallback.
replicaCount: 1

database:
  engine: postgresql
  schema: sdkwork_ai_prod
  # Inject SDKWORK_CLAW_DATABASE_URL through auth.existingSecret.
  url: ""

realtime:
  backend: memory

redis:
  enabled: false
  host: redis
  port: 6379
  database: 0
  keyPrefix: birdcoder
  tls: false
  username: ""
  password: ""

ingress:
  # Leave disabled until a real public host, TLS secret, and matching explicit
  # runtime.allowedOrigins value are supplied by an operator.
  enabled: false

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

runtime:
  deploymentProfile: cloud
  runtimeTarget: container
  environment: production
  otelServiceName: sdkwork-api-birdcoder-standalone-gateway
  # Replace the reserved hostname before enabling browser traffic. Wildcards
  # are rejected by the server's cloud runtime validation.
  allowedOrigins:
    - "https://birdcoder.example.invalid"
  # Server-owned project source and Git root. It is not a client mount or a
  # cloud code-execution runner volume.
  projectWorkspaceRoot: /var/lib/sdkwork-birdcoder/project-workspaces

auth:
  manageUsername: ""
  managePassword: ""
  # The deployment references an operator-provisioned Secret (External
  # Secrets Operator, Sealed Secrets, or cloud KMS). It must contain
  # manageUsername, managePassword, SDKWORK_CLAW_DATABASE_URL, and any
  # enabled Redis credential keys, runtime-location active/fingerprint/keyring
  # secrets, and any backup restore-test DSN. Secrets are never stored in values.
  existingSecret: sdkwork-birdcoder-runtime

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "500m"
    memory: 512Mi

autoscaling:
  enabled: false
  # Enable through values-postgresql-ha.yaml after PostgreSQL HA smoke passes.
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  # When replicaCount is 1 the PDB is skipped because a single-replica
  # deployment cannot maintain availability during voluntary disruptions.
  # Use maxUnavailable (preferred) or minAvailable to control how many pods
  # can be disrupted during node maintenance.
  minAvailable: 1
  maxUnavailable: ""

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

probes:
  liveness:
    enabled: true
    httpGet:
      path: /healthz
      port: 18989
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /readyz
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: true
    httpGet:
      path: /readyz
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sdkwork-birdcoder
          topologyKey: kubernetes.io/hostname

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s

observability:
  logLevel: info
  tracesExporter: otlp
  # Standalone/dev profile ships no OTLP collector. Production MUST inject the
  # collector endpoint via `values-postgresql-ha.yaml` or an external secret
  # (see `observability.otlpEndpoint` in that overlay).
  otlpEndpoint: ""
  otlpProtocol: grpc
  metricsExporter: prometheus
  logsExporter: otlp
  # Default 10% trace sampling. Override with `observability.tracesSamplingRatio`.
  # The ConfigMap emits OTEL_TRACES_SAMPLER=parentbased_traceidratio plus
  # OTEL_TRACES_SAMPLER_ARG only when this value is non-empty.
  tracesSamplingRatio: "0.1"

backup:
  enabled: false
  schedule: "0 3 * * *"
  retentionDays: 14
  # Production deployments MUST pin the backup image with an immutable digest.
  # Set imageDigest to override the tag-based reference (e.g. sha256:abc123...).
  image: postgres:16-alpine
  imageDigest: ""
  # Optional key in auth.existingSecret containing an isolated restore-test DSN.
  # Production HA enables this so every backup must pass a real restore.
  verifyDatabaseUrlSecretKey: ""
