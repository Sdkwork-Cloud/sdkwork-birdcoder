image:
  repository: ghcr.io/sdkwork-cloud/sdkwork-birdcoder-server
  tag: release-local
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 18989

# SQLite persistence is single-writer. Use values-postgresql-ha.yaml for horizontal scale.
replicaCount: 1

database:
  engine: sqlite
  # When engine is postgresql, provide database.url via secret and apply values-postgresql-ha.yaml.
  url: ""

ingress:
  enabled: false

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

runtime:
  accelerator: cpu
  deploymentProfile: cloud
  runtimeTarget: container
  environment: production
  otelServiceName: sdkwork-birdcoder-api-server

auth:
  manageUsername: sdkwork-birdcoder-admin
  managePassword: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "500m"
    memory: 512Mi

autoscaling:
  enabled: false
  # Enable through values-postgresql-ha.yaml after PostgreSQL HA smoke passes.
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

probes:
  liveness:
    enabled: true
    httpGet:
      path: /health
      port: 18989
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /health
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: true
    httpGet:
      path: /health
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sdkwork-birdcoder
          topologyKey: kubernetes.io/hostname

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
