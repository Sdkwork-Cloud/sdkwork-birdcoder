image:
  repository: ghcr.io/sdkwork-cloud/sdkwork-birdcoder-server
  # tag is used for development and testing only.
  # Production deployments MUST set digest to an immutable SHA256 digest
  # (e.g. sha256:abc123...) and leave tag empty.
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 18989

# SQLite persistence is single-writer. Use values-postgresql-ha.yaml for horizontal scale.
replicaCount: 1

database:
  engine: sqlite
  # When engine is postgresql, provide database.url via secret and apply values-postgresql-ha.yaml.
  url: ""

realtime:
  backend: memory

redis:
  enabled: false
  host: redis
  port: 6379
  database: 0
  keyPrefix: birdcoder
  tls: false
  username: ""
  password: ""

ingress:
  enabled: false

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

runtime:
  accelerator: cpu
  deploymentProfile: cloud
  runtimeTarget: container
  environment: production
  otelServiceName: sdkwork-birdcoder-standalone-gateway

auth:
  manageUsername: sdkwork-birdcoder-admin
  managePassword: ""
  # existingSecret: when set, the Helm chart will NOT create a Secret resource.
  # Instead, the deployment references a pre-provisioned secret (e.g. created
  # by External Secrets Operator, Sealed Secrets, or cloud KMS). The secret
  # must contain keys: manageUsername, managePassword, and optionally
  # SDKWORK_BIRDCODER_DATABASE_URL, SDKWORK_BIRDCODER_REDIS_USERNAME,
  # SDKWORK_BIRDCODER_REDIS_PASSWORD.
  existingSecret: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "500m"
    memory: 512Mi

autoscaling:
  enabled: false
  # Enable through values-postgresql-ha.yaml after PostgreSQL HA smoke passes.
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  # When replicaCount is 1 the PDB is skipped because a single-replica
  # deployment cannot maintain availability during voluntary disruptions.
  # Use maxUnavailable (preferred) or minAvailable to control how many pods
  # can be disrupted during node maintenance.
  minAvailable: 1
  maxUnavailable: ""

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

probes:
  liveness:
    enabled: true
    httpGet:
      path: /health/live
      port: 18989
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /health
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: true
    httpGet:
      path: /health
      port: 18989
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sdkwork-birdcoder
          topologyKey: kubernetes.io/hostname

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s

observability:
  logLevel: info
  tracesExporter: otlp
  # Standalone/dev profile ships no OTLP collector. Production MUST inject the
  # collector endpoint via `values-postgresql-ha.yaml` or an external secret
  # (see `observability.otlpEndpoint` in that overlay).
  otlpEndpoint: ""
  otlpProtocol: grpc
  metricsExporter: prometheus
  logsExporter: otlp
  # Default 10% trace sampling. Override with `observability.tracesSamplingRatio`.
  # The ConfigMap emits OTEL_TRACES_SAMPLER=parentbased_traceidratio plus
  # OTEL_TRACES_SAMPLER_ARG only when this value is non-empty.
  tracesSamplingRatio: "0.1"

backup:
  enabled: false
  schedule: "0 3 * * *"
  retentionDays: 14
  # Production deployments MUST pin the backup image with an immutable digest.
  # Set imageDigest to override the tag-based reference (e.g. sha256:abc123...).
  image: postgres:16-alpine
  imageDigest: ""
  # Optional: provide a test database URL for restore verification.
  # When set, each backup job will attempt to restore to this database.
  verifyDatabaseUrl: ""
