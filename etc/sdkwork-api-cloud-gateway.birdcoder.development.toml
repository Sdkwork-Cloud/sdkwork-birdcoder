mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "development"

[server]
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-drive-app-api"
workspace = "sdkwork-drive"
sdkFamily = "sdkwork-drive-app-sdk"
apiAuthority = "sdkwork-drive-app-api"
surface = "app"
apiPrefix = "/app/v3/api/drive"
runtimeMode = "embedded"
sameOriginAllowed = true
executableExport = "sdkwork_drive_gateway_assembly::assemble_application_business_router_from_env"
cargoFeature = "foundation-drive"
cargoDependency = "sdkwork-drive-gateway-assembly"
coverage = "drive-app-api-embedded-assembly-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-membership-app-api"
workspace = "sdkwork-membership"
sdkFamily = "sdkwork-membership-app-sdk"
apiAuthority = "sdkwork-membership-app-api"
surface = "app"
apiPrefix = "/app/v3/api/memberships"
runtimeMode = "embedded"
sameOriginAllowed = true
executableExport = "sdkwork_membership_gateway_assembly::assemble_application_business_router_from_env"
cargoFeature = "foundation-membership"
cargoDependency = "sdkwork-membership-gateway-assembly"
coverage = "sdkwork-membership-app-api-embedded-assembly-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-membership-backend-api"
workspace = "sdkwork-membership"
sdkFamily = "sdkwork-membership-backend-sdk"
apiAuthority = "sdkwork-membership-backend-api"
surface = "backend"
apiPrefix = "/backend/v3/api/memberships"
runtimeMode = "embedded"
sameOriginAllowed = true
executableExport = "sdkwork_membership_gateway_assembly::assemble_application_business_router_from_env"
cargoFeature = "foundation-membership"
cargoDependency = "sdkwork-membership-gateway-assembly"
coverage = "sdkwork-membership-backend-api-embedded-assembly-routes"

[cors]
allowAnyOrigin = true
allowedOrigins = []

[request]
maxBodyBytes = 33554432

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = false
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
# Development supports browser access from the host's changing LAN address.
allowedHosts = []
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[security.waf]
enabled = false
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 256
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

