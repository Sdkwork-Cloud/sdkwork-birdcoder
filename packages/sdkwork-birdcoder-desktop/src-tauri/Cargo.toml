[package]
name = "sdkwork-birdcoder-desktop"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
axum = "0.8"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sdkwork-birdcoder-server = { path = "../../sdkwork-birdcoder-server/src-host" }
sdkwork-terminal-control-plane = { path = "../../../../sdkwork-terminal/crates/sdkwork-terminal-control-plane" }
sdkwork-terminal-pty-runtime = { path = "../../../../sdkwork-terminal/crates/sdkwork-terminal-pty-runtime" }
sdkwork-terminal-protocol = { path = "../../../../sdkwork-terminal/crates/sdkwork-terminal-protocol" }
sdkwork-terminal-replay-store = { path = "../../../../sdkwork-terminal/crates/sdkwork-terminal-replay-store" }
sdkwork-terminal-session-runtime = { path = "../../../../sdkwork-terminal/crates/sdkwork-terminal-session-runtime" }
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tokio = { version = "1", features = ["net", "rt-multi-thread"] }

[lib]
name = "sdkwork_birdcoder_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
