[package]
name = "sdkwork-birdcoder-desktop"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
axum = "0.8"
notify = "8"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rfd = "0.16"
sdkwork-birdcoder-server = { workspace = true }
sdkwork-terminal-control-plane = { workspace = true }
sdkwork-terminal-pty-runtime = { workspace = true }
sdkwork-terminal-protocol = { workspace = true }
sdkwork-terminal-replay-store = { workspace = true }
sdkwork-terminal-session-runtime = { workspace = true }
tauri = { version = "~2.11.0", features = [] }
tauri-plugin-shell = "2"
tokio = { version = "1", features = ["net", "rt-multi-thread", "sync"] }

[lib]
name = "sdkwork_birdcoder_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_Graphics_Gdi",
  "Win32_UI_Shell",
  "Win32_UI_WindowsAndMessaging",
] }
