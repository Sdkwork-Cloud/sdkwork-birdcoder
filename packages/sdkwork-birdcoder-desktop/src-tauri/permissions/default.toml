[default]
description = "Default desktop app permissions for the BirdCoder Rust host bridge."
permissions = [
  "allow-host-mode",
  "allow-desktop-runtime-config",
  "allow-local-store",
  "allow-file-system-bridge",
  "allow-desktop-window-controls-bridge",
  "allow-sdkwork-terminal-bridge",
  "allow-terminal-detection",
]

[[set]]
identifier = "allow-local-store"
description = "Allows desktop local store bridge commands."
permissions = [
  "allow-local-store-get",
  "allow-local-store-set",
  "allow-local-store-delete",
  "allow-local-store-list",
  "allow-local-sql-execute-plan",
  "allow-user-home-config-read",
  "allow-user-home-config-write",
]

[[set]]
identifier = "allow-file-system-bridge"
description = "Allows mounted project file-system bridge commands."
permissions = [
  "allow-fs-list-directory",
  "allow-fs-snapshot-folder",
  "allow-fs-read-file",
  "allow-fs-get-file-revision",
  "allow-fs-get-file-revisions",
  "allow-fs-get-directory-revisions",
  "allow-fs-watch-start",
  "allow-fs-watch-stop",
  "allow-fs-write-file",
  "allow-fs-create-file",
  "allow-fs-create-directory",
  "allow-fs-delete-entry",
  "allow-fs-rename-entry",
]

[[set]]
identifier = "allow-desktop-window-controls-bridge"
description = "Allows native desktop window controls bridge commands."
permissions = [
  "allow-desktop-configure-window-controls-bridge",
  "allow-desktop-window-controls-bridge-capabilities",
  "allow-desktop-perform-window-control-action",
]

[[set]]
identifier = "allow-sdkwork-terminal-bridge"
description = "Allows sdkwork-terminal runtime bridge commands."
permissions = [
  "allow-desktop-pick-working-directory",
  "allow-desktop-session-index",
  "allow-desktop-session-replay-slice",
  "allow-desktop-session-attach",
  "allow-desktop-session-detach",
  "allow-desktop-session-reattach",
  "allow-desktop-terminal-session-inventory-list",
  "allow-desktop-local-shell-exec",
  "allow-desktop-local-shell-session-create",
  "allow-desktop-local-process-session-create",
  "allow-desktop-session-input",
  "allow-desktop-session-input-bytes",
  "allow-desktop-session-attachment-acknowledge",
  "allow-desktop-session-resize",
  "allow-desktop-session-terminate",
]

[[set]]
identifier = "allow-terminal-detection"
description = "Allows terminal CLI profile detection bridge commands."
permissions = ["allow-terminal-cli-profile-detect"]

[[permission]]
identifier = "allow-host-mode"
description = "Enables the host_mode command."
commands.allow = ["host_mode"]

